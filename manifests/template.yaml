apiVersion: v1
kind: Namespace
metadata:
  name: gpu-workload-treemap
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gpu-workload-treemap
  namespace: gpu-workload-treemap
  labels:
    app: gpu-workload-treemap
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gpu-workload-treemap
  template:
    metadata:
      labels:
        app: gpu-workload-treemap
    spec:
      containers:
        - name: gpu-workload-treemap
          image: ${PLUGIN_IMAGE}
          ports:
            - containerPort: 9443
              protocol: TCP
          volumeMounts:
            - name: plugin-serving-cert
              readOnly: true
              mountPath: /var/serving-cert
          resources:
            requests:
              cpu: 10m
              memory: 50Mi
            limits:
              cpu: 100m
              memory: 128Mi
      volumes:
        - name: plugin-serving-cert
          secret:
            secretName: plugin-serving-cert
            defaultMode: 420
      restartPolicy: Always
      dnsPolicy: ClusterFirst
---
apiVersion: v1
kind: Service
metadata:
  name: gpu-workload-treemap
  namespace: gpu-workload-treemap
  labels:
    app: gpu-workload-treemap
  annotations:
    service.beta.openshift.io/serving-cert-secret-name: plugin-serving-cert
spec:
  ports:
    - name: 9443-tcp
      protocol: TCP
      port: 9443
      targetPort: 9443
  selector:
    app: gpu-workload-treemap
  type: ClusterIP
---
apiVersion: console.openshift.io/v1
kind: ConsolePlugin
metadata:
  name: gpu-workload-treemap
spec:
  displayName: GPU Workload Treemap
  backend:
    type: Service
    service:
      name: gpu-workload-treemap
      namespace: gpu-workload-treemap
      port: 9443
      basePath: /
  i18n:
    loadType: Preload
